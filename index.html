<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artykuły - Zadanie 7</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <header class="bg-white shadow-md py-4 px-6 mb-8 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-800">Moje Artykuły</h1>
    <div class="flex gap-4">
      <button id="add-article-btn" class="hidden px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition-colors duration-300">Dodaj artykuł</button>
      <a id="login-btn" href="./login.html" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition-colors duration-300">Zaloguj się</a>
      <button id="logout-btn" class="hidden px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition-colors duration-300">Wyloguj</button>
    </div>
  </header>

  <main id="articles-container" class="max-w-4xl mx-auto px-4 pb-12 space-y-6">
    <p class="text-center text-gray-500">Ładowanie artykułów...</p>
  </main>

  <div id="article-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg p-6 w-full max-w-lg shadow-xl">
      <h2 id="modal-title" class="text-2xl font-bold mb-4 text-gray-800">Dodaj artykuł</h2>
      
      <form id="article-form" class="space-y-4">
        <input type="hidden" id="article-id">
        
        <div>
          <label class="block text-sm font-medium text-gray-700">Tytuł</label>
          <input type="text" id="title" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700">Podtytuł</label>
          <input type="text" id="subtitle" class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700">Autor</label>
          <input type="text" id="author" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700">Treść</label>
          <textarea id="content" required rows="5" class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
        </div>

        <div class="flex justify-end gap-3 pt-4">
          <button type="button" id="cancel-btn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300 transition-colors">Anuluj</button>
          <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">Zapisz</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
